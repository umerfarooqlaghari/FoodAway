<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <!-- Icon mark: bag + leaf -->
  <g>
    <!-- Bag body -->
    <rect x="4" y="20" width="32" height="28" rx="6" fill="#D4651A"/>
    <!-- Bag handle -->
    <path d="M12 20 C12 13 28 13 28 20" stroke="#D4651A" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Leaf overlay on bag -->
    <path d="M11 30 C14 22 26 22 29 30 C26 38 14 38 11 30Z" fill="#F5F3EE" opacity="0.18"/>
    <path d="M20 24 L20 36" stroke="#F5F3EE" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M20 28 C17 26 15 29 17 31" stroke="#F5F3EE" stroke-width="1.2" stroke-linecap="round" opacity="0.6" fill="none"/>
    <path d="M20 31 C23 29 25 32 23 34" stroke="#F5F3EE" stroke-width="1.2" stroke-linecap="round" opacity="0.6" fill="none"/>
    <!-- Small leaf accent top-right of bag -->
    <path d="M28 16 C30 11 36 12 34 17 C32 19 27 19 28 16Z" fill="#7A9E6E"/>
  </g>

  <!-- Wordmark: Grabengo -->
  <text
    x="46"
    y="40"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#1A1208"
  >Grabengo</text>

  <!-- Accent dot after the wordmark -->
  <circle cx="219" cy="36" r="3.5" fill="#D4651A"/>
</svg>
